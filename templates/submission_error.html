{% extends "base.html" %}
{% block title %}Tu préfères ? — Erreur{% endblock %}
{% block body %}
<main class="card-page">
  <div class="card">
    <p class="card__eyebrow">Erreur</p>
    <h1 class="card__title">Quelque chose manque</h1>
    <section data-testid="submission-error">
      <p class="error-msg">Les deux options sont obligatoires.</p>
    </section>
    <form method="post" action="/questions">
      <div class="field">
        <label for="err-opt-a">Option A</label>
        <input id="err-opt-a" type="text" name="option_a" data-testid="option-a-input" placeholder="Première option…">
      </div>
      <div class="field">
        <label for="err-opt-b">Option B</label>
        <input id="err-opt-b" type="text" name="option_b" data-testid="option-b-input" placeholder="Deuxième option…">
      </div>
      <button class="submit-btn" type="submit" data-testid="submit-button">Proposer</button>
    </form>
  </div>
</main>
{% endblock %}
