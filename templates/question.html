<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu préfères ?</title>
</head>
<body>
  <main>
    <section data-testid="question">
      <h1>Tu préfères ?</h1>
      <form method="post" action="/votes">
        <input type="hidden" name="question_id" value="{{ question_id }}">
        <button type="submit" name="option_id" value="{{ option_a_id }}" data-testid="option-a">
          {{ option_a_text }}
        </button>
        <button type="submit" name="option_id" value="{{ option_b_id }}" data-testid="option-b">
          {{ option_b_text }}
        </button>
      </form>
      <form method="post" action="/skips">
        <input type="hidden" name="question_id" value="{{ question_id }}">
        <button type="submit" data-testid="skip-button">Passer</button>
      </form>
    </section>
  </main>
</body>
</html>
